// ---- backend client ----
function api(token) {
  const base = BACKEND_URL.replace(/\/$/, "");
  const headers = (extra = {}) => ({
    Authorization: "Bearer " + token,
    ...extra
  });
  return {
    base,
    async login() {
      const r = await fetch(base + "/api/login", {
        headers: headers()
      });
      return r.ok;
    },
    async getAll() {
      const r = await fetch(base + "/api/data", {
        headers: headers()
      });
      if (!r.ok) throw new Error("auth");
      return r.json();
    },
    async put(key, value) {
      const r = await fetch(base + "/api/data/" + key, {
        method: "POST",
        headers: headers({
          "Content-Type": "application/json"
        }),
        body: JSON.stringify({
          value
        })
      });
      return r.ok;
    },
    fetchUrl: u => base + "/fetch?url=" + encodeURIComponent(u)
  };
}

const FI_KW = ["fixed income", "rates", "credit", "bond", "treasury", "mortgage", "muni", "securitiz", "macro"];

function scoreJob(t) {
  t = t.toLowerCase();
  let s = 0;
  if (ST_KW.some(k => t.includes(k))) s += 2;
  if (FI_KW.some(k => t.includes(k))) s += 3;
  if (t.includes("intern")) s -= 1;
  return s;
}
async function fetchBoard(client, slug, name, isTarget) {
  const url = `https://boards-api.greenhouse.io/v1/boards/${slug}/jobs`;
  const r = await fetch(client.fetchUrl(url), {
    signal: AbortSignal.timeout(15000)
  });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const text = await r.text();
  const data = JSON.parse(text);
  if (!Array.isArray(data.jobs)) throw new Error("no jobs");
  return data.jobs.map(j => ({
    id: `${slug}-${j.id}`,
    title: j.title.trim(),
    firm: name,
    location: j.location && j.location.name || "—",
    url: j.absolute_url,
    updated: j.updated_at,
    score: scoreJob(j.title),
    isTarget
  }));
}
function draftFromTemplate(tpl, contact, profile) {
  const first = (contact.name || "").split(" ")[0] || "there";
  const via = (contact.note || "").replace(/^.*via /, "") || "a mutual contact";
  const fill = s => (s || "").replaceAll("{first}", first).replaceAll("{firm}", contact.firm || "your desk").replaceAll("{desk}", contact.desk || "S&T").replaceAll("{me}", profile.name || "[Your name]").replaceAll("{background}", profile.background || "a background in fixed income markets").replaceAll("{via}", via);
  return {
    subject: fill(tpl.subject),
    body: fill(tpl.body)
  };
}
