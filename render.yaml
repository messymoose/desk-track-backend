services:
  - type: web
    name: desk-track-backend
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /health
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PASSPHRASE
        sync: false
      - key: DATA_DIR
        value: /data
